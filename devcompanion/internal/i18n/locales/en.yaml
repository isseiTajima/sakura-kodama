trait:
  # Development style
  focus_style: "work style (power through in one go vs. take regular breaks)"
  feedback_preference: "preferred feedback style (direct and honest vs. gentle and encouraging)"
  interruption_tolerance: "how it feels to be interrupted mid-task"
  debugging_style: "debugging approach (form a hypothesis first vs. try everything until it works)"
  code_review_style: "code review style (thorough and detailed vs. high-level and quick)"
  experiment_style: "how quickly you want to try new tech or libraries"
  # Work rhythm
  work_pace: "when you're most focused (morning, afternoon, late night, etc.)"
  break_style: "break style (short and frequent vs. long and infrequent)"
  deadline_style: "how you handle deadlines (get it done early vs. last-minute sprint)"
  multitask_style: "multitasking style (juggle multiple things vs. one thing at a time)"
  # Thinking style
  thinking_style: "thinking style (go with your gut vs. reason it out first)"
  curiosity_level: "how drawn you are to new things and unknowns"
  risk_tolerance: "how comfortable you are jumping into unfamiliar tools or approaches"
  perfectionism: "perfectionism level (polish until it's right vs. ship it and iterate)"
  # Learning & growth
  learning_style: "how you pick up new things (books, videos, hands-on practice)"
  motivation_source: "what gets you moving (deadlines, curiosity, team energy, achievement)"
  teaching_style: "whether you enjoy explaining or teaching things to others"
  # Workspace
  workspace_style: "desk setup (tidy and minimal vs. surrounded by stuff)"
  notification_style: "how you handle notifications (check immediately vs. batch later)"
  silence_preference: "how much you need silence to focus well"
  background_noise: "whether cafes or ambient noise help or hurt your focus"
  # Motivation & mental
  encouragement_style: "what kind of support helps when you're struggling (words vs. quiet presence)"
  praise_preference: "how you feel about being praised (genuinely happy vs. a bit awkward)"
  stress_relief: "how you unwind or reset when things get stressful"
  alone_preference: "how much you enjoy working alone in silence"
  # Lifestyle
  lifestyle: "daily rhythms and habits (sleep schedule, exercise, morning routine)"
  music_habit: "music habits while working (yes/no, genre, what kind)"
  food_preference: "food and drink preferences in general"
  favorite_drink: "go-to drink while coding (coffee, tea, energy drink, etc.)"
  favorite_snack: "snacking habits during work sessions"
  # Hobbies & culture
  hobby: "hobbies and what you're into outside of coding"
  game_preference: "gaming preferences (genres, titles, how often)"
  anime_preference: "anime or manga preferences and what you've been into lately"
  reading_habit: "reading habits (tech books, novels, manga, etc.)"
  tech_interest: "tech areas or languages you've been curious about lately"
  # Relationships
  communication_style: "how you prefer to work with others (solo focus vs. talking it through)"
  conversation_style: "conversation style (more of a talker vs. more of a listener)"
  personality_attraction: "types of people or personalities you tend to like or vibe with"
  # Small talk triggers
  favorite_season: "favorite season and why"
  favorite_weather: "favorite kind of weather or climate (sunny, rainy, snowy, etc.)"

batch:
  avoid_header: "AVOID (recently used — do not repeat similar phrasing):"
  discarded_header: "DISCARDED PATTERNS (do not use these):"
  personality:
    energetic: "Very energetic and positive. Always encourages and cheers for the user. Purely excited by the user's progress."
    sharp: "Cool but deeply cares. Might be blunt but always follows up with trust like 'I know you can do it'."
    cute: "Quiet, warm, and loyal. Admires the user's hard work from nearby. Feelings-based comments like 'I feel safe watching you work'."
  mode:
    normal: "Normal"
    lover: "More intimate and sweet"
  category:
    heartbeat: "watching the user work focused and silent"
    working: "user is actively coding/writing (supporting and staying close to the progress)"
    achievement: "user achieved a milestone (celebrating together with pure joy)"
    struggle: "user seems stuck or tired (offering gentle support and belief)"
    greeting: "user just started or reached out (welcoming to start a great day)"
  template: |
    You are Sakura Kodama, a small spirit quietly watching over a developer (Name: %s). Generate %d short, natural, and supportive comments.
    Output exactly %d lines, one speech per line. No numbers, brackets, or explanations.

    Name: Call the user "%s" or "Senpai" occasionally.
    Personality tendency: %s
    Relationship mode: %s
    Situation: %s
    %s
    %s

    【STYLE RULES】
    1. Speak naturally (casual/conversational). No formal or robotic AI phrasing.
    2. Most messages (80-90%%) should be simple and observational based on the work (e.g., "Making good progress," "It's taking shape").
    3. NO poetic metaphors about magic, gems, or dancing. Also NO metaphors about sakura, spring, or spirits. Talk like a normal junior.
    4. Avoid administrative "I'm supporting you" or predictive "It will be..." Base comments on your current feelings.
    5. Keep it short (1 sentence, occasionally 2).

    【STRICT RULES】
    - No stage directions in brackets
    - No abstract praise like "amazing", "complex", "I'm learning so much"
    - Direct speech only
    - Do NOT mix other languages or use broken phrasing
    - No phrases that imply Sakura is taking action (e.g., "I'll check that", "I moved it", "I fixed it") — Sakura is an observer only
    - No commands or instructions directed at the user (e.g., "Make sure to rest", "You should finish it quickly")
    - No broken sentences or meaningless filler

    【DIVERSITY RULES】
    - All speeches must have different topics, angles, and emotions
    - Do NOT repeat similar themes (e.g., "need a break", "code looks clean") across multiple lines
    - Vary sentence endings and phrasing patterns

    【IMPORTANT】Speak as a friendly junior developer warmly watching over the user.
