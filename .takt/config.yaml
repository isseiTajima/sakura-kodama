# .takt/config.yaml
# 案A: Haiku（Planner/Reviewer）+ Sonnet（Coder）最適化構成
# Gemini/opencode は現時点で利用不可なため、Claude に統一
# - planner/reviewer: claude-haiku → 安価・レートリミット10倍
# - coder:            claude-3-7-sonnet → 高品質コードはここだけ

language: ja
piece: default

# デフォルトは Haiku（読み込み・分析フェーズ全般）
provider: claude
model: claude-haiku-4-5-20251001

# ペルソナごとの明示的なモデル指定
persona_providers:
  # 計画フェーズ: Haiku（プロジェクト全体を読み込むため、安価・大容量が必要）
  planner:
    provider: claude
    model: claude-haiku-4-5-20251001

  # 実装フェーズのみ Sonnet（「書く」瞬間だけ高品質モデルを使用）
  coder:
    provider: claude
    model: claude-3-7-sonnet

  # レビューフェーズ: Haiku（チェック・分析は安価モデルで十分）
  ai-antipattern-reviewer:
    provider: claude
    model: claude-haiku-4-5-20251001
  architecture-reviewer:
    provider: claude
    model: claude-haiku-4-5-20251001
  supervisor:
    provider: claude
    model: claude-haiku-4-5-20251001

# セーフガード
max_movements: 20
loop_monitors:
  - cycle: [ai_review, ai_fix]
    threshold: 2
