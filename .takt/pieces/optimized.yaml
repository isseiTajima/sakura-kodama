# .takt/pieces/optimized.yaml
name: optimized
description: モデルルーティングを最適化した開発ピース

max_movements: 20
initial_movement: plan

loop_monitors:
  - cycle: [ai_review, ai_fix]
    threshold: 2
    judge:
      persona: supervisor
      instruction: supervise
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: reviewers

movements:
  - name: plan
    edit: false
    persona: planner
    knowledge: architecture
    instruction: plan
    output_contracts:
      report:
        - name: plan.md
          format: plan
    rules:
      - condition: "要件が明確で実装可能"
        next: write_tests
      - condition: "ユーザーが質問をしている"
        next: COMPLETE
      - condition: "要件が不明確、情報不足"
        next: ABORT

  - name: write_tests
    edit: true
    persona: coder
    policy: [coding, testing]
    session: refresh
    instruction: write-tests-first
    output_contracts:
      report:
        - name: test-scope.md
          format: coder-scope
    rules:
      - condition: "テスト作成が完了した"
        next: implement
      - condition: "テスト作成を進行できない"
        next: ABORT

  - name: implement
    edit: true
    persona: coder
    policy: [coding, testing]
    session: refresh
    instruction: implement
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
    rules:
      - condition: "実装完了"
        next: ai_review
      - condition: "判断できない、情報不足"
        next: ai_review

  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy: [review, ai-antipattern]
    instruction: ai-review
    rules:
      - condition: "AI特有の問題なし"
        next: reviewers
      - condition: "AI特有の問題あり"
        next: ai_fix

  - name: ai_fix
    edit: true
    persona: coder
    policy: [coding, testing]
    session: refresh
    instruction: ai-fix
    rules:
      - condition: "AI Reviewerの指摘に対する修正が完了した"
        next: ai_review
      - condition: "修正不要"
        next: reviewers

  - name: reviewers
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        instruction: review-arch
      - name: supervise
        edit: false
        persona: supervisor
        instruction: supervise
    rules:
      - condition: all("approved", "すべて問題なし")
        next: COMPLETE
      - condition: any("needs_fix", "要求未達成")
        next: fix

  - name: fix
    edit: true
    persona: coder
    session: refresh
    instruction: fix
    rules:
      - condition: "修正完了"
        next: reviewers
